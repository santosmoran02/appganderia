<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GanadApp - Gestión Ganadera</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f0;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .icon {
      width: 96px;
      height: 96px;
      border-radius: 20px;
      margin: 0 auto 1.5rem;
      display: block;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #2d6a2d;
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-size: 1.05rem;
      color: #555;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      padding: 0.9rem 1.5rem;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.85; }

    .btn-windows {
      background: #0078d4;
      color: white;
    }

    .btn-mac {
      background: #1a1a1a;
      color: white;
    }

    .note {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="icon" src="icon.png" alt="GanadApp" />
    <h1>GanadApp</h1>
    <p class="tagline">Gestiona tu ganado de forma sencilla.<br>Animales, historial médico, gestaciones y más.</p>

    <div class="buttons">
      <a class="btn btn-windows" href="https://github.com/santosmoran02/appganderia/releases/latest/download/GanadApp-Setup-1.0.0.exe">
        ⬇ Descargar para Windows
      </a>
      <a class="btn btn-mac" href="https://github.com/santosmoran02/appganderia/releases/latest/download/GanadApp-1.0.0.dmg">
        ⬇ Descargar para Mac
      </a>
    </div>

    <p class="note">Gratuito · Se actualiza automáticamente</p>
  </div>
</body>
</html>
