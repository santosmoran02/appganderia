name: Build y Release Windows

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Reconstruir módulos nativos para Electron
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Construir frontend (Vite)
        run: npm run build

      - name: Empaquetar instalador Windows
        run: npx electron-builder --win --x64 --publish never

      - name: Crear Release y subir instalador
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-electron/*.exe
            dist-electron/*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Construir frontend (Vite)
        run: npm run build

      - name: Empaquetar instalador Mac
        run: npx electron-builder --mac --x64 --publish never

      - name: Subir instalador Mac a Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-electron/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
